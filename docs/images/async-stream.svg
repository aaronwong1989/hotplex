<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="auto">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58A6FF" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3FB950" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D2A8FF" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF7B72" />
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#0D1117" stroke="#30363D" stroke-width="2"/>

  <text x="450" y="40" font-family="-apple-system, sans-serif" font-size="20" font-weight="bold" fill="#E6EDF3" text-anchor="middle">Full-Duplex Asynchronous Event Stream</text>

  <rect x="30" y="80" width="160" height="380" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="110" y="110" font-family="-apple-system, sans-serif" font-size="16" font-weight="bold" fill="#8B949E" text-anchor="middle">Client</text>
  <text x="110" y="130" font-family="-apple-system, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">(WebSocket / API)</text>

  <rect x="50" y="160" width="120" height="40" rx="4" fill="#1F6FEB" opacity="0.15" stroke="#58A6FF" stroke-width="1"/>
  <text x="110" y="185" font-family="monospace" font-size="12" fill="#58A6FF" text-anchor="middle">Send Cmd</text>

  <rect x="50" y="360" width="120" height="40" rx="4" fill="#238636" opacity="0.15" stroke="#3FB950" stroke-width="1"/>
  <text x="110" y="385" font-family="monospace" font-size="12" fill="#3FB950" text-anchor="middle">Recv Stream</text>

  <rect x="250" y="80" width="400" height="380" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="110" font-family="-apple-system, sans-serif" font-size="16" font-weight="bold" fill="#E6EDF3" text-anchor="middle">HotPlex Engine (Go)</text>
  
  <rect x="280" y="150" width="140" height="60" rx="6" fill="#21262D" stroke="#D2A8FF" stroke-width="1"/>
  <text x="350" y="175" font-family="monospace" font-size="14" font-weight="bold" fill="#D2A8FF" text-anchor="middle">go wsReadLoop()</text>
  <text x="350" y="195" font-family="-apple-system, sans-serif" font-size="11" fill="#8B949E" text-anchor="middle">Parse &amp; Forward</text>

  <rect x="280" y="350" width="140" height="60" rx="6" fill="#21262D" stroke="#D2A8FF" stroke-width="1"/>
  <text x="350" y="375" font-family="monospace" font-size="14" font-weight="bold" fill="#D2A8FF" text-anchor="middle">go wsWriteLoop()</text>
  <text x="350" y="395" font-family="-apple-system, sans-serif" font-size="11" fill="#8B949E" text-anchor="middle">Consume eventChan</text>

  <rect x="490" y="270" width="130" height="50" rx="6" fill="#21262D" stroke="#3FB950" stroke-width="1"/>
  <text x="555" y="295" font-family="monospace" font-size="13" font-weight="bold" fill="#3FB950" text-anchor="middle">go stdoutScan()</text>
  <text x="555" y="310" font-family="-apple-system, sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">bufio.Scanner</text>

  <rect x="490" y="380" width="130" height="50" rx="6" fill="#21262D" stroke="#FF7B72" stroke-width="1"/>
  <text x="555" y="405" font-family="monospace" font-size="13" font-weight="bold" fill="#FF7B72" text-anchor="middle">go stderrScan()</text>
  <text x="555" y="420" font-family="-apple-system, sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">bufio.Scanner</text>

  <rect x="710" y="80" width="160" height="380" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="790" y="110" font-family="-apple-system, sans-serif" font-size="16" font-weight="bold" fill="#8B949E" text-anchor="middle">OS Process</text>
  <text x="790" y="130" font-family="-apple-system, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">(PGID Isolated)</text>

  <rect x="730" y="160" width="120" height="40" rx="4" fill="#21262D" stroke="#58A6FF" stroke-width="1"/>
  <text x="790" y="185" font-family="monospace" font-size="12" fill="#58A6FF" text-anchor="middle">STDIN</text>

  <rect x="730" y="275" width="120" height="40" rx="4" fill="#21262D" stroke="#3FB950" stroke-width="1"/>
  <text x="790" y="300" font-family="monospace" font-size="12" fill="#3FB950" text-anchor="middle">STDOUT</text>

  <rect x="730" y="385" width="120" height="40" rx="4" fill="#21262D" stroke="#FF7B72" stroke-width="1"/>
  <text x="790" y="410" font-family="monospace" font-size="12" fill="#FF7B72" text-anchor="middle">STDERR</text>


  <path d="M 170 180 L 270 180" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="220" y="170" font-family="-apple-system, sans-serif" font-size="11" fill="#58A6FF" text-anchor="middle">WS Msg</text>

  <path d="M 420 180 L 720 180" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="560" y="170" font-family="-apple-system, sans-serif" font-size="11" fill="#58A6FF" text-anchor="middle">io.WriteString() (Non-blocking)</text>

  <path d="M 720 295 L 630 295" stroke="#3FB950" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="4,2"/>
  <text x="675" y="285" font-family="-apple-system, sans-serif" font-size="11" fill="#3FB950" text-anchor="middle">Chunk</text>

  <path d="M 720 405 L 630 405" stroke="#FF7B72" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="4,2"/>
  <text x="675" y="395" font-family="-apple-system, sans-serif" font-size="11" fill="#FF7B72" text-anchor="middle">Error</text>

  <rect x="420" y="335" width="30" height="90" rx="4" fill="#8957E5" opacity="0.2" stroke="#D2A8FF" stroke-width="1"/>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#D2A8FF" text-anchor="middle" transform="rotate(-90 435 385)">eventChan</text>

  <path d="M 490 295 L 435 295 L 435 325" stroke="#3FB950" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 490 405 L 458 405" stroke="#FF7B72" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <path d="M 410 380 L 410 380 L 428 380" stroke="#D2A8FF" stroke-width="2" marker-start="url(#arrow-purple)" fill="none"/>

  <path d="M 280 380 L 180 380" stroke="#3FB950" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="230" y="370" font-family="-apple-system, sans-serif" font-size="11" fill="#3FB950" text-anchor="middle">JSON Stream</text>

</svg>
