    <text x="108" y="135" text-anchor="middle" class="text-sub">System-Level Sandbox</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(45, 420)">
    <rect width="215" height="160" rx="12" class="feature-card" />
    <circle cx="108" cy="55" r="35" class="icon-bg c3-fill" />
    <path d="M93 55 A15 15 0 1 1 123 55 A15 15 0 1 1 93 55" class="icon-stroke c3-stroke" />
