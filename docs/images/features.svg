    <circle cx="108" cy="55" r="35" class="icon-bg c4-fill" />
    <path d="M98 48 L118 48 M108 40 L118 48 L108 56" class="icon-stroke c4-stroke" />
    <path d="M118 62 L98 62 M108 54 L98 62 L108 70" class="icon-stroke c4-stroke" />
    <text x="108" y="115" text-anchor="middle" class="text-title">Full-Duplex I/O</text>
    <text x="108" y="135" text-anchor="middle" class="text-sub">Slack, TG, DingTalk</text>
  </g>

