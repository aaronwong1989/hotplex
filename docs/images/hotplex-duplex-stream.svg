<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f6f8fa; }
      .layer { stroke-width: 2; fill: #ffffff; stroke: #e1e4e8; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: bold; font-size: 16px; fill: #24292e; }
      .subtitle { font-family: monospace; font-size: 12px; fill: #6a737d; }
      
      .pipe { fill: none; stroke-width: 4; stroke-linecap: round; }
      .pipe-in { stroke: #0366d6; opacity: 0.2; }
      .pipe-out { stroke: #28a745; opacity: 0.2; }
      
      @keyframes flowDown { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
      @keyframes flowUp { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }
      
      .data-in { fill: none; stroke: #0366d6; stroke-width: 4; stroke-dasharray: 10 10; animation: flowDown 0.5s linear infinite; }
      .data-out-raw { fill: none; stroke: #d73a49; stroke-width: 4; stroke-dasharray: 5 15; animation: flowUp 0.6s linear infinite; }
      .data-out-norm { fill: none; stroke: #28a745; stroke-width: 4; stroke-dasharray: 10 10; animation: flowUp 0.5s linear infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <rect x="150" y="40" width="500" height="60" rx="6" class="layer" />
  <text x="400" y="75" text-anchor="middle" class="title">Client (Go SDK / WebSocket)</text>

  <rect x="150" y="160" width="500" height="60" rx="6" class="layer" />
  <text x="400" y="195" text-anchor="middle" class="title">HotPlex Engine (Session Routing &amp; WAF)</text>

  <rect x="150" y="280" width="500" height="60" rx="6" class="layer" style="stroke: #6f42c1;" />
  <text x="400" y="305" text-anchor="middle" class="title" style="fill: #6f42c1;">Provider Adapter</text>
  <text x="400" y="325" text-anchor="middle" class="subtitle">Standardizes Claude/OpenCode Protocols</text>

  <rect x="150" y="400" width="500" height="60" rx="6" class="layer" style="stroke: #24292e; fill: #24292e;" />
  <text x="400" y="435" text-anchor="middle" class="title" style="fill: #ffffff;">Sub-Process (OS Native Agent)</text>

  <line x1="300" y1="100" x2="300" y2="400" class="pipe pipe-in" />
  <line x1="300" y1="100" x2="300" y2="400" class="data-in" />
  <text x="250" y="250" class="subtitle" style="fill: #0366d6;">stdin (JSON)</text>

  <line x1="500" y1="340" x2="500" y2="400" class="pipe" style="stroke: #d73a49; opacity: 0.2;" />
  <line x1="500" y1="340" x2="500" y2="400" class="data-out-raw" />
  <text x="520" y="380" class="subtitle" style="fill: #d73a49;">Raw Stdout/err</text>

  <line x1="500" y1="100" x2="500" y2="280" class="pipe pipe-out" />
  <line x1="500" y1="100" x2="500" y2="280" class="data-out-norm" />
  <text x="520" y="220" class="subtitle" style="fill: #28a745;">Normalized ProviderEvent</text>

</svg>
