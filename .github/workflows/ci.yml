name: CI

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 最小权限原则
permissions:
  contents: read
  pull-requests: write  # Required for Codecov PR comments

jobs:
  # 检测文件变更
  changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'

  # Unit Tests
  test-unit:
    needs: [changes]
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Setup Mock Claude CLI
        uses: ./.github/actions/setup-mock-cli

      - name: Run Unit Tests (CI optimized)
        run: make test-ci

      - name: Generate Coverage
        if: needs.changes.outputs.go == 'true'
        run: go test -coverprofile=coverage.out -covermode=atomic -short ./...

      - name: Upload Coverage to Codecov
        if: needs.changes.outputs.go == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # 当 Go 文件变化时运行，否则跳过（跳过视为成功）
  test-integration:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Setup Mock Claude CLI
        uses: ./.github/actions/setup-mock-cli

      - name: Run Integration Tests
        run: make test-integration

  # Code quality check
  lint:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --timeout=10m
