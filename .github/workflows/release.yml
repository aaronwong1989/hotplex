name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write  # Required for SBOM/Provenance attestation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Extract Release Notes
        run: |
          # Extract content between first ## [v... and second ## [v...
          awk '/^## \[v/ { if (count++) exit; next } count' CHANGELOG.md > RELEASE_NOTES.md

          # Add release metadata
          echo -e "\n\n---\n\n### 📊 Release Statistics\n" >> RELEASE_NOTES.md

          # Commit stats
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline ${PREV_TAG}..HEAD | wc -l | tr -d ' ')
            echo "- **Commits**: ${COMMITS}" >> RELEASE_NOTES.md

            # Contributors
            CONTRIBUTORS=$(git log --format='%an' ${PREV_TAG}..HEAD | sort -u | wc -l | tr -d ' ')
            echo "- **Contributors**: ${CONTRIBUTORS}" >> RELEASE_NOTES.md

            # Code changes
            STATS=$(git diff --shortstat ${PREV_TAG}..HEAD | tr -d '\n')
            if [ -n "$STATS" ]; then
              echo "- **Changes**: ${STATS}" >> RELEASE_NOTES.md
            fi
          fi

          echo -e "\n--- EXTRACTED RELEASE NOTES ---"
          cat RELEASE_NOTES.md
          echo "-------------------------------"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
