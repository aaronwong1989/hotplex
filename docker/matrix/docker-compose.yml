# ------------------------------------------------------------------------------
# Named Volumes
# ------------------------------------------------------------------------------
volumes:
  # Shared across instances
  matrix-go-mod: { name: matrix-go-mod }
  matrix-go-build: { name: matrix-go-build }
  # Per-instance Claude state (isolated between bots)
  matrix-claude-01: { name: matrix-claude-01 }
  matrix-claude-02: { name: matrix-claude-02 }
  matrix-claude-03: { name: matrix-claude-03 }

# ------------------------------------------------------------------------------
# 🚀 Multi-Bot Matrix
# ------------------------------------------------------------------------------
# Instance-specific configurations only. Shared configs are in common.yml.
#
# Instance directory structure:
#   ~/.hotplex/instances/<BOT_ID>/
#   ├── .env                    # Credentials (loaded via env_file)
#   ├── configs/                # Bot-specific configs
#   ├── projects/               # Project workspaces
#   └── ...
# ------------------------------------------------------------------------------
services:
  hotplex-01:
    extends: { file: common.yml, service: hotplex-base }
    container_name: hotplex-01
    ports: [ "127.0.0.1:18080:8080" ]
    env_file: [ .env-01 ]
    volumes:
      - matrix-claude-01:/home/hotplex/.claude:rw
      - ~/.hotplex/instances/U0AHRCL1KCM:/home/hotplex/.hotplex:rw
      - ~/.hotplex/instances/U0AHRCL1KCM/projects:/home/hotplex/projects:rw
    environment:
      HOTPLEX_BOT_ID: U0AHRCL1KCM
    labels:
      - "hotplex.bot.id=U0AHRCL1KCM"
      - "hotplex.bot.role=primary"

  hotplex-02:
    extends: { file: common.yml, service: hotplex-base }
    container_name: hotplex-02
    ports: [ "127.0.0.1:18081:8080" ]
    env_file: [ .env-02 ]
    volumes:
      - matrix-claude-02:/home/hotplex/.claude:rw
      - ~/.hotplex/instances/U0AJVRH4YF6:/home/hotplex/.hotplex:rw
      - ~/.hotplex/instances/U0AJVRH4YF6/projects:/home/hotplex/projects:rw
    environment:
      HOTPLEX_BOT_ID: U0AJVRH4YF6
    labels:
      - "hotplex.bot.id=U0AJVRH4YF6"
      - "hotplex.bot.role=secondary"

  hotplex-03:
    extends: { file: common.yml, service: hotplex-base }
    container_name: hotplex-03
    ports: [ "127.0.0.1:18082:8080" ]
    env_file: [ .env-03 ]
    volumes:
      - matrix-claude-03:/home/hotplex/.claude:rw
      - ~/.hotplex/instances/U0AL7H8UU75:/home/hotplex/.hotplex:rw
      - ~/.hotplex/instances/U0AL7H8UU75/projects:/home/hotplex/projects:rw
    environment:
      HOTPLEX_BOT_ID: U0AL7H8UU75
    labels:
      - "hotplex.bot.id=U0AL7H8UU75"
      - "hotplex.bot.role=secondary"
