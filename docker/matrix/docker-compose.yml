# ------------------------------------------------------------------------------
# Named Volumes
# ------------------------------------------------------------------------------
volumes:
  # Shared across instances (module download cache - read-mostly, safe to share)
  hotplex-matrix-go-mod: { name: hotplex-matrix-go-mod }
  # Writable plugins cache (marketplaces, etc.)
  hotplex-matrix-plugins: { name: hotplex-matrix-plugins }
  # Per-instance build cache (isolated to avoid cross-contamination)
  hotplex-matrix-go-build-01: { name: hotplex-matrix-go-build-01 }
  hotplex-matrix-go-build-02: { name: hotplex-matrix-go-build-02 }
  hotplex-matrix-go-build-03: { name: hotplex-matrix-go-build-03 }
  # Per-instance Claude state
  hotplex-matrix-claude-01: { name: hotplex-matrix-claude-01 }
  hotplex-matrix-claude-02: { name: hotplex-matrix-claude-02 }
  hotplex-matrix-claude-03: { name: hotplex-matrix-claude-03 }

# ------------------------------------------------------------------------------
# 🚀 Multi-Bot Matrix
# ------------------------------------------------------------------------------
# Instance-specific configurations only. Shared configs are in common.yml.
#
# Instance directory structure:
#   ~/.hotplex/instances/<BOT_ID>/
#   ├── .env                    # Credentials (loaded via env_file)
#   ├── configs/                # Bot-specific configs
#   ├── projects/               # Project workspaces
#   └── ...
# ------------------------------------------------------------------------------
services:
  hotplex-01:
    extends: { file: common.yml, service: hotplex-base }
    container_name: hotplex-01
    ports: [ "127.0.0.1:18080:8080", "127.0.0.1:19080:9080" ]
    env_file: [ .env-01 ]
    volumes:
      - hotplex-matrix-claude-01:/home/hotplex/.claude:rw
      - hotplex-matrix-go-build-01:/home/hotplex/.cache/go-build:rw
      - ~/.hotplex/instances/U0AHRCL1KCM:/home/hotplex/.hotplex:rw
      - ~/.hotplex/instances/U0AHRCL1KCM/projects:/home/hotplex/projects:rw
    environment:
      HOTPLEX_BOT_ID: U0AHRCL1KCM
    labels:
      - "hotplex.bot.id=U0AHRCL1KCM"
      - "hotplex.bot.role=primary"

  hotplex-02:
    extends: { file: common.yml, service: hotplex-base }
    container_name: hotplex-02
    ports: [ "127.0.0.1:18081:8080", "127.0.0.1:19081:9080" ]
    env_file: [ .env-02 ]
    volumes:
      - hotplex-matrix-claude-02:/home/hotplex/.claude:rw
      - hotplex-matrix-go-build-02:/home/hotplex/.cache/go-build:rw
      - ~/.hotplex/instances/U0AJVRH4YF6:/home/hotplex/.hotplex:rw
      - ~/.hotplex/instances/U0AJVRH4YF6/projects:/home/hotplex/projects:rw
    environment:
      HOTPLEX_BOT_ID: U0AJVRH4YF6
    labels:
      - "hotplex.bot.id=U0AJVRH4YF6"
      - "hotplex.bot.role=secondary"

  hotplex-03:
    extends: { file: common.yml, service: hotplex-base }
    container_name: hotplex-03
    ports: [ "127.0.0.1:18082:8080", "127.0.0.1:19082:9080" ]
    env_file: [ .env-03 ]
    volumes:
      - hotplex-matrix-claude-03:/home/hotplex/.claude:rw
      - hotplex-matrix-go-build-03:/home/hotplex/.cache/go-build:rw
      - ~/.hotplex/instances/U0AL7H8UU75:/home/hotplex/.hotplex:rw
      - ~/.hotplex/instances/U0AL7H8UU75/projects:/home/hotplex/projects:rw
    environment:
      HOTPLEX_BOT_ID: U0AL7H8UU75
    labels:
      - "hotplex.bot.id=U0AL7H8UU75"
      - "hotplex.bot.role=secondary"
