# ------------------------------------------------------------------------------
# 🛠️ Common Configurations (YAML Anchors)
# ------------------------------------------------------------------------------
# Convention over Configuration: All default values are defined here.
# Only override in .env-* files when necessary.
# Inspired by OpenClaw DevKit patterns.
# ------------------------------------------------------------------------------
x-hotplex-common: &hotplex-common
  # Default to Remote Go image unless overridden by HOTPLEX_IMAGE env var
  image: ${HOTPLEX_IMAGE:-ghcr.io/hrygo/hotplex:latest-go}
  init: true # Proper PID 1 signal handling
  # Run as root to fix permissions via entrypoint, then drop to hotplex user
  user: "0:0"
  environment: &common-env
    # ─────────────────────────────────────────────────────────────────
    # Timezone Configuration
    # ─────────────────────────────────────────────────────────────────
    TZ: ${TZ:-Asia/Shanghai}
    HOST_UID: ${HOST_UID:-1000}
    # ─────────────────────────────────────────────────────────────────
    # Proxy Configuration (OPTIONAL)
    # Set HTTP_PROXY/HTTPS_PROXY in .env-* files if needed
    # ─────────────────────────────────────────────────────────────────
    HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
    HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
    NO_PROXY: localhost,127.0.0.1,host.docker.internal,.local,.internal
    ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-http://host.docker.internal:15721}
    HOTPLEX_ALLOWED_ORIGINS: ${HOTPLEX_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://host.docker.internal:8080}
    # ─────────────────────────────────────────────────────────────────
    # Git Identity Defaults
    # ─────────────────────────────────────────────────────────────────
    GIT_USER_NAME: ${GIT_USER_NAME:-HotPlexBot}
    GIT_USER_EMAIL: ${GIT_USER_EMAIL:-noreply@hotplex.dev}
    # ─────────────────────────────────────────────────────────────────
    # GitHub Authentication - Container token via env_file (.env-01/.env-02/.env-03)
    # 注意：不在此处通过 ${} 引用宿主变量，避免 token 泄漏
    # ─────────────────────────────────────────────────────────────────
    # ChatApp Core Paths (Container Paths - DO NOT CHANGE)
    # HOTPLEX_DATA_ROOT was removed per unified config design spec
    # HOTPLEX_PROJECTS_DIR and HOTPLEX_MESSAGE_STORE_SQLITE_PATH are kept as they are used by code
    HOTPLEX_PROJECTS_DIR: /home/hotplex/projects
    HOTPLEX_MESSAGE_STORE_SQLITE_PATH: /home/hotplex/.hotplex/chatapp_messages.db
    HOTPLEX_CHATAPPS_CONFIG_DIR: /home/hotplex/.hotplex/configs
    # ─────────────────────────────────────────────────────────────────
    # Admin API (Default: port 8081)
    # ─────────────────────────────────────────────────────────────────
    HOTPLEX_ADMIN_PORT: ${HOTPLEX_ADMIN_PORT:-8081}
    HOTPLEX_API_KEY: ${HOTPLEX_API_KEY:-}
    # ─────────────────────────────────────────────────────────────────
    # Engine Timeouts (Convention: sensible defaults)
    # ─────────────────────────────────────────────────────────────────
    HOTPLEX_EXECUTION_TIMEOUT: ${HOTPLEX_EXECUTION_TIMEOUT:-30m}
    HOTPLEX_IDLE_TIMEOUT: ${HOTPLEX_IDLE_TIMEOUT:-1h}
    # ─────────────────────────────────────────────────────────────────
    # OpenCode Compatibility (Default: enabled)
    # ─────────────────────────────────────────────────────────────────
    HOTPLEX_OPENCODE_COMPAT_ENABLED: ${HOTPLEX_OPENCODE_COMPAT_ENABLED:-true}
    # ─────────────────────────────────────────────────────────────────
    # Message Store (Default: enabled with streaming)
    # ─────────────────────────────────────────────────────────────────
    HOTPLEX_MESSAGE_STORE_ENABLED: ${HOTPLEX_MESSAGE_STORE_ENABLED:-true}
    HOTPLEX_MESSAGE_STORE_TYPE: ${HOTPLEX_MESSAGE_STORE_TYPE:-sqlite}
    HOTPLEX_MESSAGE_STORE_SQLITE_MAX_SIZE_MB: ${HOTPLEX_MESSAGE_STORE_SQLITE_MAX_SIZE_MB:-1024}
    HOTPLEX_MESSAGE_STORE_STREAMING_ENABLED: ${HOTPLEX_MESSAGE_STORE_STREAMING_ENABLED:-true}
    HOTPLEX_MESSAGE_STORE_STREAMING_TIMEOUT: ${HOTPLEX_MESSAGE_STORE_STREAMING_TIMEOUT:-5m}
    # ─────────────────────────────────────────────────────────────────
    # Python Tools Auto-Install (space-separated, format: pkg[:bin])
    # Examples: "notebooklm", "pandas", "black:blackd"
    # Tools are installed to system Python via uv on first startup
    # ─────────────────────────────────────────────────────────────────
    PIP_TOOLS: ${PIP_TOOLS:-}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  cap_drop: [ NET_RAW, NET_ADMIN ]
  security_opt: [ no-new-privileges:true ]
  healthcheck: &common-healthcheck
    # Use curl for health check (more reliable than wget --spider)
    test: [ "CMD", "curl", "-sf", "http://localhost:8080/health" ]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  logging: &common-logging
    driver: json-file
    options: { max-size: "10m", max-file: "3" }
  deploy: &common-deploy
    resources:
      limits: { memory: 2G, cpus: '2.0' }
      reservations: { memory: 512M, cpus: '0.25' }
  restart: unless-stopped

# ------------------------------------------------------------------------------
# 🛠️ Shared Service Template (Service-Level DRY)
# ------------------------------------------------------------------------------
services:
  hotplex-base:
    <<: *hotplex-common
    volumes:
      # Claude config from host (read-only, hot-reload on host changes)
      - ${HOME}/.claude/settings.json:/home/hotplex/.claude/settings.json:ro
      - ${HOME}/.claude/skills:/home/hotplex/.claude/skills:ro
      - ${HOME}/.claude/scripts:/home/hotplex/.claude/scripts:ro
      - ${HOME}/.claude/statusline.sh:/home/hotplex/.claude/statusline.sh:ro
      # Shared Go module cache (safe to share across instances)
      - hotplex-matrix-go-mod:/home/hotplex/go/pkg/mod:rw
      # Note: Per-instance build cache is mounted in docker-compose.yml per service
      # Entrypoint mount (enables hot-updates without image rebuild)
      - ../docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
    environment:
      # Merge common-env anchor + service-specific overrides
      <<: *common-env
      # Container paths (consistent across all instances)
      HOTPLEX_SERVER_CONFIG: /home/hotplex/.hotplex/configs/server.yaml
