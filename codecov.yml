codecov:
  require_ci_to_pass: true

coverage:
  status:
    patch:
      default:
        # Informational mode: reports coverage but never fails
        informational: true
    project:
      default:
        target: auto
        threshold: 5%

parsers:
  go:
    partials_as_hits: true

ignore:
  - "**/mocks/**"
  - "**/test/**"
